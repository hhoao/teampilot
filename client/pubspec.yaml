name: teampilot
description: "A new Flutter project."
publish_to: 'none'


version: 1.0.0+1

environment:
  sdk: ^3.8.1


dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.3
  xterm:
    path: packages/xterm
  flutter_pty: ^0.4.2

  flutter_bloc: ^9.1.0
  bloc_concurrency: ^0.3.0
  equatable: ^2.0.5
  go_router: ^16.3.0
  path_provider: ^2.1.2
  path: ^1.9.0
  json_annotation: ^4.9.0
  uuid: ^4.5.1
  window_manager: ^0.5.1
  web_socket_channel: ^2.4.0
  multi_split_view: ^3.6.1
  logger: ^2.6.0
  file_picker: ^9.0.0
  url_launcher: ^6.3.2
  infinite_scroll_pagination: ^5.1.1
  http: ^1.6.0
  crypto: ^3.0.7
  archive: ^4.0.9
  toggle_switch: ^2.3.0
  google_fonts: ^8.1.0
  flex_color_scheme: ^8.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.6.0
  json_serializable: ^6.9.5
  flutter_launcher_icons: ^0.14.4
  rename_app: ^1.6.6

flutter:
  uses-material-design: true
  assets:
    - google_fonts/

flutter_launcher_icons:
  android: false
  ios: false
  image_path: assets/icons/icon.png
  min_sdk_android: 21
  windows:
    generate: true
    image_path: assets/icons/icon.png
    icon_size: 48
  macos:
    generate: true
    image_path: assets/icons/icon.png
