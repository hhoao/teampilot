name: teampilot
description: "A team-oriented and easy-to-use desktop client packaged based on the terminal AI Agent"
publish_to: 'none'

version: 2.3.0

environment:
  sdk: ^3.8.1


dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  collection: ^1.19.0
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^10.2.0
  re_editor:
    path: packages/re-editor
  re_highlight: ^0.0.3
  flutter_alacritty:
    path: packages/flutter_alacritty
  flutter_pty:
    path: packages/flutter_pty
  dartssh2:
    path: packages/dartssh2
  flutter_bloc: ^9.1.0
  bloc_concurrency: ^0.3.0
  equatable: ^2.0.5
  toastification:
    path: packages/toastification
  go_router: ^16.3.0
  path_provider: ^2.1.2
  path: ^1.9.0
  toml: ^0.18.0
  json_annotation: ^4.9.0
  uuid: ^4.5.1
  window_manager: ^0.5.1
  web_socket_channel: ^2.4.0
  logger: ^2.6.0
  file_picker: ^9.0.0
  url_launcher: ^6.3.2
  infinite_scroll_pagination: ^5.1.1
  http: ^1.6.0
  package_info_plus: ^8.3.0
  pub_semver: ^2.2.0
  android_package_installer: ^0.0.3
  crypto: ^3.0.7
  archive: ^4.0.9
  toggle_switch: ^2.3.0
  google_fonts: ^8.1.0
  flex_color_scheme: ^8.4.0
  flutter_animate: 4.5.2
  sqlite3: ^3.3.1
  synchronized: ^3.3.1
  meta: ^1.16.0
  flutter_svg: ^2.3.0
  intl: any
  watcher: ^1.2.0
dependency_overrides:
  flutter_pty:
    path: packages/flutter_pty
  rust_lib_flutter_alacritty:
    path: packages/flutter_alacritty/packages/rust_lib_flutter_alacritty

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.6.0
  json_serializable: ^6.9.5
  flutter_launcher_icons: ^0.14.4
  rename_app: ^1.6.6
  fake_async: ^1.3.1
  flutter_rust_bridge: ^2.12.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - google_fonts/
    - assets/icons/
    - assets/file_icons/
    - assets/providers/
    - assets/geometry/
    - assets/fonts/terminal/
    - assets/rtk/rtk-rewrite.sh
    - assets/rtk/rtk-rewrite.ps1
    - assets/hooks/teampilot-deny-team-lead-self-message.sh
    - assets/hooks/teampilot-deny-team-lead-self-message.ps1
    - assets/hooks/teampilot-team-lead-delegate-only.sh
    - assets/hooks/teampilot-team-lead-delegate-only.ps1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/icons/icon_bg.png
  min_sdk_android: 21
  windows:
    generate: true
    image_path: assets/icons/icon_bg.png
    icon_size: 256
  macos:
    generate: true
    image_path: assets/icons/icon_bg.png
