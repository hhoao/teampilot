name: Release Desktop Packages

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build (branch / tag / sha). Leave empty for current."
        required: false
        default: ""

defaults:
  run:
    working-directory: client

jobs:
  build-linux:
    name: Build Linux (deb + AppImage)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
          submodules: recursive

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake git ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev libsecret-1-dev \
            dpkg fakeroot file libfuse2

      - name: Install appimagetool
        run: |
          wget -qO /tmp/appimagetool \
            https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x /tmp/appimagetool
          sudo mv /tmp/appimagetool /usr/local/bin/appimagetool
          appimagetool --version || true

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Activate fastforge
        run: dart pub global activate fastforge

      - name: Resolve Flutter packages
        run: flutter pub get

      - name: Sync bundled Google Fonts (Noto Sans SC)
        run: dart run tool/sync_bundled_google_fonts.dart

      - name: Package
        run: fastforge package --platform linux --targets deb,appimage

      - uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: client/dist/**/*
          if-no-files-found: error

  build-macos:
    name: Build macOS (DMG)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
          submodules: recursive

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install fastforge + appdmg
        run: |
          dart pub global activate fastforge
          npm install -g appdmg

      - name: Resolve Flutter packages
        run: flutter pub get

      - name: Sync bundled Google Fonts (Noto Sans SC)
        run: dart run tool/sync_bundled_google_fonts.dart

      - name: Package
        run: fastforge package --platform macos --targets dmg

      - uses: actions/upload-artifact@v4
        with:
          name: macos-packages
          path: client/dist/**/*
          if-no-files-found: error

  build-windows:
    name: Build Windows (MSIX + EXE + ZIP)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
          submodules: recursive

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Activate fastforge
        run: dart pub global activate fastforge

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          Add-Content $env:GITHUB_PATH "C:\Program Files (x86)\Inno Setup 6"

      - name: Install Inno Chinese (Simplified) language file
        shell: pwsh
        run: |
          # choco innosetup 不含 ChineseSimplified.isl；从 jrsoftware/issrc 官方仓库取 Unofficial 译稿（与 ISCC 的 Languages\ 路径一致）
          $langDir = Join-Path ${env:ProgramFiles(x86)} "Inno Setup 6\Languages"
          New-Item -ItemType Directory -Force -Path $langDir | Out-Null
          $url = "https://raw.githubusercontent.com/jrsoftware/issrc/main/Files/Languages/Unofficial/ChineseSimplified.isl"
          $out = Join-Path $langDir "ChineseSimplified.isl"
          Invoke-WebRequest -Uri $url -OutFile $out -UseBasicParsing
          if (-not (Test-Path -LiteralPath $out)) { throw "Failed to download ChineseSimplified.isl" }

      - name: Add pub-cache to PATH (Windows)
        shell: pwsh
        run: |
          Add-Content $env:GITHUB_PATH "$env:LOCALAPPDATA\Pub\Cache\bin"

      - name: Resolve Flutter packages
        run: flutter pub get

      - name: Sync bundled Google Fonts (Noto Sans SC)
        run: dart run tool/sync_bundled_google_fonts.dart

      - name: Package Windows (ZIP + MSIX)
        run: fastforge package --platform windows --targets zip,msix

      - name: Package Windows (EXE installer)
        run: fastforge package --platform windows --targets exe

      - name: Verify Windows release files
        shell: pwsh
        run: |
          $m = Select-String -Path pubspec.yaml -Pattern '^version:\s*(.+)$' | ForEach-Object { $_.Matches[0].Groups[1].Value.Trim() }
          if (-not $m) { throw "Could not read version from pubspec.yaml" }
          $d = Join-Path "dist" $m
          if (-not (Test-Path -LiteralPath $d)) { throw "Missing directory: $d" }
          $zip = @(Get-ChildItem -LiteralPath $d -File | Where-Object { $_.Name -like '*-windows.zip' })
          $msix = @(Get-ChildItem -LiteralPath $d -File | Where-Object { $_.Name -like '*.msix' })
          # Inno 安装包：同级目录下的 *setup.exe；排除 *setup_exe\ 暂存目录里的 TeamPilot.exe
          $setup = @(Get-ChildItem -LiteralPath $d -File | Where-Object { $_.Name -like '*setup.exe' })
          if ($setup.Count -lt 1) {
            $setup = @(Get-ChildItem -Path "dist" -Recurse -File | Where-Object {
              $_.Name -like '*setup.exe' -and $_.FullName -notmatch 'setup_exe[/\\]'
            })
          }
          if ($zip.Count -lt 1) { throw "Missing *-windows.zip under $d" }
          if ($msix.Count -lt 1) { throw "Missing *.msix under $d" }
          if ($setup.Count -lt 1) {
            Write-Host "Contents of $d :"
            Get-ChildItem -LiteralPath $d -Force | ForEach-Object { Write-Host "  $($_.Name)" }
            throw "Missing *setup.exe (Inno installer). Expected under $d or dist (excluding *setup_exe staging)."
          }

      - name: Upload dist snapshot (job failed)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: windows-dist-snapshot
          path: client/dist
          if-no-files-found: ignore

      - name: List packaged Windows files (debug)
        shell: pwsh
        run: Get-ChildItem -Recurse -File dist | ForEach-Object { "$($_.FullName) $($_.Length)" }

      - uses: actions/upload-artifact@v4
        with:
          name: windows-packages
          path: |
            client/dist/**/*.msix
            client/dist/**/*.exe
            client/dist/**/*.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [build-linux, build-macos, build-windows]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release-files
          python3 << 'PY'
          import os, shutil, pathlib, sys
          artifacts = pathlib.Path("artifacts")
          out = pathlib.Path("release-files")
          out.mkdir(parents=True, exist_ok=True)
          suffixes = (".deb", ".appimage", ".dmg", ".msix", ".exe", ".zip")
          # flutter_app_packager 临时目录：…/teampilot-*-windows-setup_exe/TeamPilot.exe 等，不是发布物
          staging_suffixes = ("_exe", "_msix", "_zip", "_deb", "_dmg", "_appimage")

          def is_inside_packaging_staging(path: pathlib.Path) -> bool:
              return any(
                  part.endswith(staging_suffixes) for part in path.parts[:-1]
              )

          all_files = []
          for root, _dirs, files in os.walk(artifacts):
              for name in files:
                  p = pathlib.Path(root) / name
                  if is_inside_packaging_staging(p):
                      continue
                  low = name.lower()
                  if not any(low.endswith(s) for s in suffixes):
                      continue
                  # 只收录 Inno 安装包（*-setup.exe），排除 Runner 内的 TeamPilot.exe 等
                  if low.endswith(".exe") and "-setup" not in low:
                      continue
                  all_files.append(p)
          print("Matched artifact files:")
          for p in sorted(all_files, key=lambda x: str(x)):
              print(" ", p)
          if len(all_files) != 6:
              print(f"ERROR: expected exactly 6 release binaries under artifacts/, found {len(all_files)}", file=sys.stderr)
              sys.exit(1)
          for p in all_files:
              dest = out / p.name
              if dest.exists() and dest.resolve() != p.resolve():
                  print("WARN: duplicate basename, overwriting:", p.name, "<-", p)
              shutil.copy2(p, dest)
          copied = sorted(out.iterdir())
          print("release-files:")
          for f in copied:
              print(f"  {f.name}  {f.stat().st_size}")
          if len(copied) != 6:
              print("ERROR: expected exactly 6 files in release-files/", file=sys.stderr)
              sys.exit(1)
          PY

      - name: Generate release notes (Conventional Commits)
        id: git-cliff
        uses: orhun/git-cliff-action@v4
        with:
          args: --latest --strip header --github-repo ${{ github.repository }}
        env:
          OUTPUT: release-notes.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/*
          body_path: ${{ steps.git-cliff.outputs.changelog }}
          fail_on_unmatched_files: true
