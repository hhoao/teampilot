name: Release Desktop Packages

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build (branch / tag / sha). Leave empty for current."
        required: false
        default: ""

defaults:
  run:
    working-directory: client

jobs:
  build-linux:
    name: Build Linux (deb + AppImage)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
          submodules: recursive

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake git ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev libsecret-1-dev \
            dpkg fakeroot file libfuse2

      - name: Install appimagetool
        run: |
          wget -qO /tmp/appimagetool \
            https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x /tmp/appimagetool
          sudo mv /tmp/appimagetool /usr/local/bin/appimagetool
          appimagetool --version || true

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Activate fastforge
        run: dart pub global activate fastforge

      - name: Resolve Flutter packages
        run: flutter pub get

      - name: Sync bundled Google Fonts (Noto Sans SC)
        run: dart run tool/sync_bundled_google_fonts.dart

      - name: Package
        run: fastforge package --platform linux --targets deb,appimage

      - uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: client/dist/**/*
          if-no-files-found: error

  build-macos:
    name: Build macOS (DMG)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
          submodules: recursive

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install fastforge + appdmg
        run: |
          dart pub global activate fastforge
          npm install -g appdmg

      - name: Resolve Flutter packages
        run: flutter pub get

      - name: Sync bundled Google Fonts (Noto Sans SC)
        run: dart run tool/sync_bundled_google_fonts.dart

      - name: Package
        run: fastforge package --platform macos --targets dmg

      - uses: actions/upload-artifact@v4
        with:
          name: macos-packages
          path: client/dist/**/*
          if-no-files-found: error

  build-windows:
    name: Build Windows (MSIX + EXE + ZIP)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
          submodules: recursive

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Activate fastforge
        run: dart pub global activate fastforge

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          Add-Content $env:GITHUB_PATH "C:\Program Files (x86)\Inno Setup 6"

      - name: Add pub-cache to PATH (Windows)
        shell: pwsh
        run: |
          Add-Content $env:GITHUB_PATH "$env:LOCALAPPDATA\Pub\Cache\bin"

      - name: Resolve Flutter packages
        run: flutter pub get

      - name: Sync bundled Google Fonts (Noto Sans SC)
        run: dart run tool/sync_bundled_google_fonts.dart

      # zip → exe → msix：单次 flutter build，且避免 msix 流程后影响同目录下的 zip/exe 产物收集
      - name: Package
        run: fastforge package --platform windows --targets zip,exe,msix

      - name: List packaged Windows files (debug)
        shell: pwsh
        run: Get-ChildItem -Recurse -File dist | ForEach-Object { "$($_.FullName) $($_.Length)" }

      - uses: actions/upload-artifact@v4
        with:
          name: windows-packages
          path: |
            client/dist/**/*.msix
            client/dist/**/*.exe
            client/dist/**/*.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [build-linux, build-macos, build-windows]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release-files
          python3 << 'PY'
          import os, shutil, pathlib, sys
          artifacts = pathlib.Path("artifacts")
          out = pathlib.Path("release-files")
          out.mkdir(parents=True, exist_ok=True)
          suffixes = (".deb", ".appimage", ".dmg", ".msix", ".exe", ".zip")
          all_files = []
          for root, _dirs, files in os.walk(artifacts):
              for name in files:
                  p = pathlib.Path(root) / name
                  low = name.lower()
                  if any(low.endswith(s) for s in suffixes):
                      all_files.append(p)
          print("Matched artifact files:")
          for p in sorted(all_files, key=lambda x: str(x)):
              print(" ", p)
          if len(all_files) != 6:
              print(f"ERROR: expected exactly 6 release binaries under artifacts/, found {len(all_files)}", file=sys.stderr)
              sys.exit(1)
          for p in all_files:
              dest = out / p.name
              if dest.exists() and dest.resolve() != p.resolve():
                  print("WARN: duplicate basename, overwriting:", p.name, "<-", p)
              shutil.copy2(p, dest)
          copied = sorted(out.iterdir())
          print("release-files:")
          for f in copied:
              print(f"  {f.name}  {f.stat().st_size}")
          if len(copied) != 6:
              print("ERROR: expected exactly 6 files in release-files/", file=sys.stderr)
              sys.exit(1)
          PY

      - name: Generate release notes (Conventional Commits)
        id: git-cliff
        uses: orhun/git-cliff-action@v4
        with:
          args: --latest --strip header --github-repo ${{ github.repository }}
        env:
          OUTPUT: release-notes.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/*
          body_path: ${{ steps.git-cliff.outputs.changelog }}
          fail_on_unmatched_files: true
