name: Client Build Verify

on:
  push:
    branches: [main]
    paths:
      - "client/**"
      - ".github/workflows/client-verify.yml"
      - ".github/workflows/release.yml"
      - ".github/workflows/auto-tag.yml"
  pull_request:
    paths:
      - "client/**"
      - ".github/workflows/client-verify.yml"
      - ".github/workflows/release.yml"
      - ".github/workflows/auto-tag.yml"

concurrency:
  group: client-verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: client

jobs:
  verify:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            label: Linux
            platform: linux
            install_linux_deps: true
            package_deb: true
          - os: windows-latest
            label: Windows
            platform: windows
            install_linux_deps: false
            package_deb: false
          - os: macos-latest
            label: macOS
            platform: macos
            install_linux_deps: false
            package_deb: false
          - os: ubuntu-22.04
            label: Android
            platform: android
            install_linux_deps: false
            package_deb: false

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux build dependencies
        if: matrix.install_linux_deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake git ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev libsecret-1-dev \
            dpkg fakeroot file

      - uses: actions/setup-java@v4
        if: matrix.platform == 'android'
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Accept Android SDK licenses
        if: matrix.platform == 'android'
        run: yes | flutter doctor --android-licenses

      - name: Activate fastforge
        if: matrix.package_deb
        run: dart pub global activate fastforge

      - name: Add pub-cache to PATH
        if: matrix.package_deb
        run: echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"

      - name: Resolve Flutter packages
        run: flutter pub get

      - name: Sync bundled Google Fonts (Noto Sans SC)
        run: dart run tool/sync_bundled_google_fonts.dart

      - name: Analyze (errors only)
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Unit and widget tests
        run: flutter test --exclude-tags integration

  integration-linux:
    name: Linux integration (Claude PTY + Docker SSH)
    runs-on: ubuntu-22.04
    timeout-minutes: 25
    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake git ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev libsecret-1-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Resolve Flutter packages
        run: flutter pub get

      - name: Sync bundled Google Fonts (Noto Sans SC)
        run: dart run tool/sync_bundled_google_fonts.dart

      - name: Build Linux (PTY native lib)
        run: flutter build linux --debug

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build mixed Docker image (cached)
        uses: docker/build-push-action@v6
        with:
          context: client/test/integration/docker
          file: client/test/integration/docker/Dockerfile.mixed
          tags: teampilot-it-ssh-mixed:latest
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Mixed team Claude integration tests (L2 + L3)
        env:
          LD_LIBRARY_PATH: build/linux/x64/debug/bundle/lib
        run: flutter test --tags "integration && linux-pty"
